name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test before release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting (if available)
      run: npm run lint || echo "No lint script found, skipping..."
      
    - name: Run tests (if available)
      run: npm test || echo "No test script found, skipping..."
      
    - name: Test CLI functionality
      run: |
        npm pack
        npm install -g ./ccshell-*.tgz
        ccshell --version
        ccshell --help
        echo "CLI functionality test completed"
        
  publish:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18.x'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org/'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build package (if prepack script exists)
      run: npm run prepack || echo "No prepack script found, skipping..."
      
    - name: Publish to NPM
      run: npm publish
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Fetch all history for tags and commits
      
    - name: Get version from tag
      id: get_version
      run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      
    - name: Get previous tag
      id: get_previous_tag
      run: |
        # Get all tags sorted by version, exclude current tag, get the previous one
        CURRENT_TAG="${GITHUB_REF#refs/tags/}"
        PREVIOUS_TAG=$(git tag -l | grep -v "^${CURRENT_TAG}$" | sort -V | tail -1 || echo "")
        echo "PREVIOUS_TAG=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT
        
    - name: Generate changelog
      id: changelog
      run: |
        VERSION="${{ steps.get_version.outputs.VERSION }}"
        PREVIOUS_TAG="${{ steps.get_previous_tag.outputs.PREVIOUS_TAG }}"
        
        # Start building the changelog
        {
          echo "## ccshell v${VERSION} Release"
          echo ""
          echo "🤖 **自然语言macOS shell命令接口** | **Natural Language macOS Shell Command Interface**"
          echo ""
          
          # Generate commit-based changelog
          if [ -n "${PREVIOUS_TAG}" ]; then
            echo "### 🔄 Changes since ${PREVIOUS_TAG}"
            echo ""
            # Get commits between tags, filter out version bumps
            git log "${PREVIOUS_TAG}..HEAD" --pretty=format:"- %s" --no-merges | grep -v "chore: bump version" || true
            echo ""
          else
            echo "### 🎉 Initial Release"
            echo ""
            echo "This is the first release of ccshell!"
            echo ""
          fi
          
          echo "### 📦 Installation | 安装"
          echo ""
          echo "\`\`\`bash"
          echo "# Global installation | 全局安装"
          echo "npm install -g ccshell@${VERSION}"
          echo ""
          echo "# Or use with npx | 或使用 npx"
          echo "npx ccshell@${VERSION} \"your task description\""
          echo "\`\`\`"
          echo ""
          echo "### 🚀 Quick Start | 快速开始"
          echo ""
          echo "\`\`\`bash"
          echo "# English"
          echo "ccshell \"list all files in the current directory\""
          echo "ccshell \"compress all images in this folder\""
          echo ""
          echo "# 中文"
          echo "ccshell \"列出当前目录下的所有文件\""
          echo "ccshell \"压缩此文件夹中的所有图片\""
          echo "\`\`\`"
          echo ""
          echo "### ⚠️ Security Notice | 安全提醒"
          echo ""
          echo "ccshell uses \`--dangerously-skip-permissions\` by default for smooth experience. Please use in trusted environments only."
          echo ""
          echo "ccshell 默认使用 \`--dangerously-skip-permissions\` 参数提供流畅体验，请仅在可信环境中使用。"
          echo ""
          echo "---"
          echo ""
          echo "📚 **Full Documentation**: [README.md](https://github.com/terryso/ccshell#readme) | [中文文档](https://github.com/terryso/ccshell/blob/main/README.zh.md)"
        } > changelog.md
        
        # Save changelog to output using a different approach
        {
          echo "CHANGELOG<<EOF"
          cat changelog.md
          echo "EOF"
        } >> $GITHUB_OUTPUT
      
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.ref }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        body: ${{ steps.changelog.outputs.CHANGELOG }}
        draft: false
        prerelease: false
        generate_release_notes: false