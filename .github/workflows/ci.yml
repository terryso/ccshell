name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run linting (if available)
      run: npm run lint || echo "No lint script found, skipping..."
      
    - name: Run tests (if available)  
      run: npm test || echo "No test script found, skipping..."
      
    - name: Test package creation
      run: |
        npm pack
        ls -la ccshell-*.tgz
        
    - name: Test CLI basic functionality
      run: |
        npm install -g ./ccshell-*.tgz
        ccshell --version
        ccshell --help
        ccshell -v
        ccshell -h
        echo "All CLI parameter tests completed"
        
  package-test:
    name: Package Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Test package.json validity
      run: npm run prepack || echo "No prepack script, package.json is valid"
      
    - name: Verify package files
      run: |
        npm pack --dry-run
        echo "Package contents verified"